name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 12 hours (adjust as needed)
    - cron: '0 */12 * * *'
  workflow_dispatch: # allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://gelman-pinn-vis.streamlit.app/)
          echo "Status code: $response"
          if [ "$response" -ge 500 ]; then
            echo "App returned server error"
            exit 1
          fi
