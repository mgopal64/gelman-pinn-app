name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Visit app in headless browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Loading page...');
            await page.goto('https://gelman-pinn-vis.streamlit.app/', { waitUntil: 'networkidle', timeout: 120000 });

            const wakeButton = await page.\$('button:has-text(\"Yes, get this app back up\")');
            if (wakeButton) {
              console.log('App is sleeping, clicking wake button...');
              await wakeButton.click();
              await page.waitForTimeout(30000);
              console.log('Waited 30s after clicking wake button');
            } else {
              console.log('App appears to be awake already');
            }

            console.log('Page title:', await page.title());
            await browser.close();
          })();
          "
